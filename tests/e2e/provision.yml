---
# End-to-end test: Tenant provisioner flow (new pattern)
#
# Uses tenant roles: keycloak_user, namespace, gitea, litellm, gitops_bootstrap, showroom
# Runs against an existing cluster with shared infra already deployed.
#
# Usage:
#   bash tests/e2e/run.sh provision -e guid=test01 -e cluster_admin_agnosticd_sa_token=sha256~xxx

- name: "E2E Test: MCP with OpenShift Tenant Provisioner"
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    ACTION: provision
    guid: "{{ lookup('env', 'GUID') | default('test01', true) }}"
    output_dir: "{{ playbook_dir }}/output"

    # ---------------------------------------------------------------
    # Cluster connection
    # ---------------------------------------------------------------
    sandbox_openshift_api_url: "https://api.cnv-us-east-ocp-3.rhdp.net:6443"
    cluster_admin_agnosticd_sa_token: "{{ lookup('env', 'CLUSTER_ADMIN_TOKEN') | default('REPLACE_ME', true) }}"
    sandbox_openshift_namespace: "sandbox-{{ guid }}"

    # ---------------------------------------------------------------
    # Common
    # ---------------------------------------------------------------
    common_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=12') }}"

    # ---------------------------------------------------------------
    # Tenant username -- used by all tenant roles
    # ---------------------------------------------------------------
    ocp4_workload_tenant_keycloak_username: "mcpuser-{{ guid }}"

    # ---------------------------------------------------------------
    # Workload: ocp4_workload_tenant_keycloak_user
    # ---------------------------------------------------------------
    ocp4_workload_tenant_keycloak_username: "mcpuser-{{ guid }}"

    # ---------------------------------------------------------------
    ocp4_workload_tenant_keycloak_user_password: "{{ common_password }}"
    ocp4_workload_tenant_username: "{{ ocp4_workload_tenant_keycloak_username }}"

    # Workload: ocp4_workload_tenant_namespace
    # ---------------------------------------------------------------
    ocp4_workload_tenant_namespace_prefix: "{{ ocp4_workload_tenant_keycloak_username }}"
    ocp4_workload_tenant_namespace_suffixes:
    - librechat
    - mcp-gitea
    - mcp-openshift
    - gitea
    - showroom
    ocp4_workload_tenant_namespace_limit_range:
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 50m
        memory: 128Mi

    # ---------------------------------------------------------------
    # Workload: ocp4_workload_tenant_gitea
    # ---------------------------------------------------------------
    ocp4_workload_tenant_gitea_namespace: "gitea-{{ ocp4_workload_tenant_keycloak_username }}"
    ocp4_workload_tenant_gitea_admin_password: "{{ common_password }}"
    ocp4_workload_tenant_gitea_username: "{{ ocp4_workload_tenant_keycloak_username }}"
    ocp4_workload_tenant_gitea_password: "{{ common_password }}"
    ocp4_workload_tenant_gitea_repositories:
    - name: mcp
      repo: https://github.com/rhpds/ocpsandbox-mcp-with-openshift-gitops
      private: false

    # ---------------------------------------------------------------
    # Workload: ocp4_workload_litellm_virtual_keys
    # ---------------------------------------------------------------
    litellm_url: "https://litellm-prod.apps.maas.redhatworkshops.io"
    litellm_master_key: "{{ lookup('env', 'LITELLM_MASTER_KEY') | default('REPLACE_ME', true) }}"
    ocp4_workload_litellm_virtual_keys_models:
    - llama-scout-17b
    - qwen3-14b
    ocp4_workload_litellm_virtual_keys_duration: "3d"
    ocp4_workload_litellm_virtual_keys_multi_user: false
    ocp4_workload_litellm_virtual_keys_user_count: 1
    ocp4_workload_litellm_virtual_keys_verify_ssl: true

    # ---------------------------------------------------------------
    # Workload: ocp4_workload_gitops_bootstrap
    # ---------------------------------------------------------------
    ocp4_workload_gitops_bootstrap_application_name: "bootstrap-tenant"
    ocp4_workload_gitops_bootstrap_repo_revision: main
    ocp4_workload_gitops_bootstrap_helm_values:
      tenant:
        username: "{{ ocp4_workload_tenant_keycloak_username }}"

    # ---------------------------------------------------------------
    # Workload: ocp4_workload_showroom
    # ---------------------------------------------------------------
    openshift_api_url: "{{ sandbox_openshift_api_url }}"
    openshift_cluster_admin_token: "{{ cluster_admin_agnosticd_sa_token }}"
    ocp4_workload_showroom_namespace: "showroom-{{ ocp4_workload_tenant_keycloak_username }}"
    ocp4_workload_showroom_content_git_repo: https://github.com/rhpds/lb1726-mcp-showroom
    ocp4_workload_showroom_content_git_repo_ref: sandbox-login-instructions
    ocp4_workload_showroom_content_only: false

  tasks:
  - name: Create output directory
    ansible.builtin.file:
      path: "{{ output_dir }}"
      state: directory
      mode: "0755"

  - name: Discover cluster ingress domain
    kubernetes.core.k8s_info:
      host: "{{ sandbox_openshift_api_url }}"
      api_key: "{{ cluster_admin_agnosticd_sa_token }}"
      validate_certs: false
      api_version: config.openshift.io/v1
      kind: Ingress
      name: cluster
    register: r_ingress

  - name: Set ingress domain fact
    ansible.builtin.set_fact:
      openshift_cluster_ingress_domain: "{{ r_ingress.resources[0].spec.domain }}"

  - name: "Debug: cluster info"
    ansible.builtin.debug:
      msg:
        guid: "{{ guid }}"
        username: "{{ ocp4_workload_tenant_keycloak_username }}"
        ingress_domain: "{{ openshift_cluster_ingress_domain }}"

  # ===================================================================
  # Step 1: Create RHBK user
  # ===================================================================
  - name: "Step 1: Create Keycloak (RHBK) user"
    ansible.builtin.include_role:
      name: agnosticd.namespaced_workloads.ocp4_workload_tenant_keycloak_user

  # ===================================================================
  # Step 2: Create tenant namespaces
  # ===================================================================
  - name: "Step 2: Create tenant namespaces"
    ansible.builtin.include_role:
      name: agnosticd.namespaced_workloads.ocp4_workload_tenant_namespace

  # ===================================================================
  # Step 3: Deploy Gitea instance + create user + migrate repos
  # ===================================================================
  - name: "Step 3: Deploy Gitea and create user"
    ansible.builtin.include_role:
      name: agnosticd.namespaced_workloads.ocp4_workload_tenant_gitea

  # ===================================================================
  # Step 4: LiteMaaS virtual key
  # ===================================================================
  - name: "Step 4: Create LiteMaaS virtual key"
    ansible.builtin.include_role:
      name: rhpds.litellm_virtual_keys.ocp4_workload_litellm_virtual_keys

  # ===================================================================
  # Step 5: GitOps bootstrap (tenant app-of-apps)
  # ===================================================================
  - name: Set gitops_bootstrap repo URL from gitea_url fact
    ansible.builtin.set_fact:
      ocp4_workload_gitops_bootstrap_repo_url: >-
        {{ gitea_url }}/{{ ocp4_workload_tenant_keycloak_username }}/mcp.git
      ocp4_workload_gitops_bootstrap_helm_values:
        tenant:
          username: "{{ ocp4_workload_tenant_keycloak_username }}"
        deployer:
          domain: "{{ openshift_cluster_ingress_domain }}"
          litemaas_url: "{{ litellm_api_endpoint }}/v1"
          litemaas_key: "{{ litellm_virtual_key }}"

  - name: "Step 5: Bootstrap tenant GitOps"
    ansible.builtin.include_role:
      name: agnosticd.core_workloads.ocp4_workload_gitops_bootstrap

  # ===================================================================
  # Step 6: Showroom
  # ===================================================================
  - name: "Step 6: Deploy Showroom"
    ansible.builtin.include_role:
      name: agnosticd.showroom.ocp4_workload_showroom

  # ===================================================================
  # Summary
  # ===================================================================
  - name: "E2E Test Complete"
    ansible.builtin.debug:
      msg:
      - "Username:    {{ ocp4_workload_tenant_keycloak_username }}"
      - "Password:    {{ common_password }}"
      - "LibreChat:   https://librechat-librechat-{{ ocp4_workload_tenant_keycloak_username }}.{{ openshift_cluster_ingress_domain }}"
      - "Gitea:       https://gitea-gitea-{{ ocp4_workload_tenant_keycloak_username }}.{{ openshift_cluster_ingress_domain }}"
      - "Showroom:    https://showroom-showroom-{{ ocp4_workload_tenant_keycloak_username }}.{{ openshift_cluster_ingress_domain }}"
